<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoC | BBP/VDP by Radit</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            background-color: #0a0a0f;
            color: #00f0ff;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            /* Grid Background */
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        
        .container {
            background: rgba(19, 19, 31, 0.85);
            padding: 50px;
            border: 1px solid #00f0ff;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2), inset 0 0 20px rgba(0, 240, 255, 0.1);
            border-radius: 12px;
            text-align: center;
            position: relative;
            backdrop-filter: blur(8px);
            max-width: 600px;
            width: 90%;
        }
        
        /* Glowing Animated Border */
        .container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, #00f0ff, #ff0055, #00ff88, #00f0ff);
            z-index: -1;
            filter: blur(15px);
            opacity: 0.6;
            border-radius: 14px;
            background-size: 400%;
            animation: glowing 15s linear infinite;
        }
        
        @keyframes glowing {
            0% { background-position: 0 0; }
            50% { background-position: 400% 0; }
            100% { background-position: 0 0; }
        }

        .title {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            color: #ff0055;
            text-shadow: 0 0 15px rgba(255, 0, 85, 0.6);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .hacker-name {
            font-size: 1.5rem;
            color: #00f0ff;
            margin-bottom: 30px;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
        }

        .typing-container {
            display: inline-block;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 6px;
            border-left: 3px solid #00ff88;
        }

        .typing-text {
            overflow: hidden;
            border-right: .15em solid #00f0ff;
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: .05em;
            color: #e2e8f0;
            font-size: 1.1rem;
            animation: 
                typing 3.5s steps(40, end),
                blink-caret .75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #00f0ff; }
        }
        
        /* Contact Email Style */
        .contact-box {
            margin-bottom: 30px;
        }
        
        .email-link {
            display: inline-block;
            color: #00f0ff;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 8px 16px;
            border: 1px dashed rgba(0, 240, 255, 0.5);
            border-radius: 4px;
            transition: all 0.3s ease;
            background: rgba(0, 240, 255, 0.05);
        }
        
        .email-link:hover {
            color: #00ff88;
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
            text-shadow: 0 0 8px rgba(0, 255, 136, 0.5);
            transform: translateY(-2px);
        }

        .footer-status {
            font-size: 0.9rem;
            color: #718096;
            display: flex;
            justify-content: space-between;
            border-top: 1px dashed rgba(0, 240, 255, 0.3);
            padding-top: 20px;
            font-weight: bold;
        }
        
        .blink-red {
            color: #ff0055;
            text-shadow: 0 0 5px rgba(255, 0, 85, 0.5);
            animation: blinker 1.5s linear infinite;
        }
        
        @keyframes blinker {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">POC BBP/VDP by</h1>
        <div class="hacker-name">
            by <strong>Radit Restu Juniarko</strong>
        </div>
        
        <div class="typing-container">
            <div class="typing-text">> Vulnerability confirmed. Link claimed.</div>
        </div>
        
        <div class="contact-box">
            <a href="mailto:radit.restu.juniarko12@gmail.com" class="email-link">
                [ Contact Security Researcher ]
            </a>
        </div>
        
        <div class="footer-status">
            <span>Status: <span class="blink-red">PWNED</span></span>
            <span>Proof of Concept</span>
        </div>
    </div>
</body>
</html>
